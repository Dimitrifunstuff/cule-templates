<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Game Radar</title>
<style>
  /* ============================================================
     Game Radar — welcome page
     Cyberpunk-dark gaming dashboard. Self-contained: no external
     fonts or assets. Renders cleanly inside browser://welcome.
     ============================================================ */

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100%; }
  body {
    font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
    color: #e0f7ff;
    background-color: #050811;
    background-image:
      radial-gradient(1200px 600px at 12% -10%, rgba(0, 245, 255, 0.10), transparent 70%),
      radial-gradient(900px 500px at 110% 10%, rgba(255, 0, 200, 0.07), transparent 70%),
      linear-gradient(180deg, #070a14 0%, #050811 100%);
    background-repeat: no-repeat;
    background-attachment: fixed;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* faint scanline grid for that arcade vibe */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(0, 245, 255, 0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 245, 255, 0.025) 1px, transparent 1px);
    background-size: 32px 32px;
    mask-image: radial-gradient(1200px 800px at 50% 30%, #000 0%, transparent 90%);
    -webkit-mask-image: radial-gradient(1200px 800px at 50% 30%, #000 0%, transparent 90%);
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1080px;
    margin: 0 auto;
    padding: 56px 28px 80px;
  }

  /* ---- hero --------------------------------------------------- */
  .hero { text-align: center; margin-bottom: 28px; }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: "JetBrains Mono", "Consolas", ui-monospace, monospace;
    font-size: 10.5px;
    letter-spacing: 0.32em;
    color: #00f5ff;
    text-transform: uppercase;
    padding: 6px 12px;
    border: 1px solid rgba(0, 245, 255, 0.32);
    border-radius: 999px;
    background: rgba(0, 245, 255, 0.04);
    box-shadow: 0 0 24px rgba(0, 245, 255, 0.10) inset;
    margin-bottom: 18px;
  }
  .eyebrow .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #00f5ff;
    box-shadow: 0 0 10px #00f5ff;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.85); }
  }
  h1 {
    margin: 0 0 8px;
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    background: linear-gradient(180deg, #ffffff 0%, #a8b1c4 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tagline {
    margin: 0;
    color: #6c7689;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  /* ---- search ------------------------------------------------- */
  form.search {
    margin: 32px auto 14px;
    max-width: 720px;
    position: relative;
    display: flex;
    align-items: center;
    background: linear-gradient(180deg, #0f1626 0%, #0a0f1c 100%);
    border: 1px solid rgba(0, 245, 255, 0.22);
    border-radius: 14px;
    padding: 0 12px 0 46px;
    height: 56px;
    transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
  }
  form.search:focus-within {
    border-color: rgba(0, 245, 255, 0.65);
    box-shadow:
      0 0 0 4px rgba(0, 245, 255, 0.10),
      0 18px 50px -10px rgba(0, 245, 255, 0.20);
    transform: translateY(-1px);
  }
  form.search svg.glass {
    position: absolute;
    left: 18px; top: 50%; transform: translateY(-50%);
    color: #00f5ff; opacity: 0.85;
  }
  form.search input {
    flex: 1;
    border: none; outline: none; background: transparent;
    color: #e0f7ff;
    font: 500 15.5px/1 inherit;
    letter-spacing: 0.15px;
  }
  form.search input::placeholder { color: #4f5a73; }
  form.search button {
    flex: 0 0 auto;
    background: linear-gradient(180deg, rgba(0, 245, 255, 0.18) 0%, rgba(0, 245, 255, 0.06) 100%);
    color: #00f5ff;
    border: 1px solid rgba(0, 245, 255, 0.45);
    border-radius: 10px;
    padding: 9px 16px;
    font: 600 12px/1 "JetBrains Mono", "Consolas", monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
  }
  form.search button:hover {
    background: rgba(0, 245, 255, 0.22);
    color: #e0f7ff;
    border-color: rgba(0, 245, 255, 0.75);
  }
  .search-hint {
    text-align: center;
    color: #4f5a73;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  /* ---- quick links ------------------------------------------- */
  .quick {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 48px;
  }
  .quick a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    color: #a8b1c4;
    background: rgba(255, 255, 255, 0.025);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 999px;
    font-size: 12.5px;
    letter-spacing: 0.04em;
    text-decoration: none;
    transition: color 140ms ease, background 140ms ease, border-color 140ms ease, transform 140ms ease;
  }
  .quick a:hover {
    color: #e0f7ff;
    background: rgba(0, 245, 255, 0.06);
    border-color: rgba(0, 245, 255, 0.30);
    transform: translateY(-1px);
  }
  .quick a .glyph {
    font-size: 14px;
    line-height: 1;
  }

  /* ---- section header ---------------------------------------- */
  .section-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 0 4px 16px;
  }
  .section-title {
    font-family: "JetBrains Mono", "Consolas", monospace;
    font-size: 11px;
    letter-spacing: 0.32em;
    color: #6c7689;
    text-transform: uppercase;
  }
  .section-title b {
    color: #00f5ff;
    font-weight: 600;
  }
  .filter {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 8px;
    padding: 6px 10px;
    color: #a8b1c4;
    font: 12.5px/1 inherit;
    width: 220px;
    outline: none;
    transition: border-color 140ms ease, background 140ms ease;
  }
  .filter::placeholder { color: #4f5a73; }
  .filter:focus {
    border-color: rgba(0, 245, 255, 0.35);
    background: rgba(0, 245, 255, 0.04);
    color: #e0f7ff;
  }

  /* ---- game grid --------------------------------------------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
  }
  .tile {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 16px;
    height: 124px;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.025) 0%, rgba(255, 255, 255, 0.01) 100%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    color: #e0f7ff;
    text-decoration: none;
    overflow: hidden;
    transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
  }
  .tile::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(220px 120px at 20% 0%, var(--tile-glow, rgba(0, 245, 255, 0.18)), transparent 70%);
    opacity: 0.55;
    transition: opacity 180ms ease;
    pointer-events: none;
  }
  .tile:hover {
    transform: translateY(-2px);
    border-color: rgba(0, 245, 255, 0.40);
    background: linear-gradient(180deg, rgba(0, 245, 255, 0.06) 0%, rgba(0, 245, 255, 0.01) 100%);
    box-shadow: 0 14px 40px -16px rgba(0, 245, 255, 0.30);
  }
  .tile:hover::before { opacity: 1; }
  .tile .icon {
    position: relative;
    z-index: 1;
    font-size: 28px;
    line-height: 1;
    filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.6));
  }
  .tile .meta { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 4px; }
  .tile .name {
    font-weight: 600;
    font-size: 14.5px;
    letter-spacing: 0.1px;
    line-height: 1.2;
  }
  .tile .kind {
    font-family: "JetBrains Mono", "Consolas", monospace;
    font-size: 10px;
    letter-spacing: 0.22em;
    color: #6c7689;
    text-transform: uppercase;
  }

  .empty {
    grid-column: 1 / -1;
    padding: 28px;
    border: 1px dashed rgba(255, 255, 255, 0.10);
    border-radius: 14px;
    text-align: center;
    color: #4f5a73;
    font-size: 13px;
  }

  /* ---- footer ------------------------------------------------- */
  .foot {
    margin-top: 56px;
    text-align: center;
    color: #4f5a73;
    font-family: "JetBrains Mono", "Consolas", monospace;
    font-size: 10.5px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
  }
  .foot b {
    color: #6c7689;
    font-weight: 500;
  }

  /* ---- scrollbar --------------------------------------------- */
  html {
    scrollbar-width: thin;
    scrollbar-color: rgba(0, 245, 255, 0.40) transparent;
  }
  ::-webkit-scrollbar { width: 12px; height: 12px; }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, rgba(0, 245, 255, 0.45) 0%, rgba(0, 245, 255, 0.16) 100%);
    background-clip: padding-box;
    border: 3px solid transparent;
    border-radius: 999px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: linear-gradient(180deg, rgba(0, 245, 255, 0.80) 0%, rgba(0, 245, 255, 0.38) 100%);
    background-clip: padding-box;
  }
  ::-webkit-scrollbar-thumb:active {
    background: linear-gradient(180deg, #00f5ff 0%, rgba(0, 245, 255, 0.55) 100%);
    background-clip: padding-box;
  }
  ::-webkit-scrollbar-corner { background: transparent; }
</style>
</head>
<body>
  <div class="wrap">

    <header class="hero">
      <div class="eyebrow"><span class="dot"></span><span>// GAME RADAR //</span></div>
      <h1>What's the play?</h1>
      <p class="tagline">Search · paste URL · jump straight to a wiki</p>
    </header>

    <form class="search" autocomplete="off">
      <svg class="glass" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="q" type="text" placeholder="Search Google · enter a URL · find a guide" autofocus />
      <button type="submit">Go</button>
    </form>
    <div class="search-hint">↵ enter to launch · Esc to clear</div>

    <nav class="quick" aria-label="Quick links">
      <a href="https://store.steampowered.com/"><span class="glyph">⚙</span>Steam</a>
      <a href="https://www.youtube.com/feed/gaming"><span class="glyph">▶</span>YouTube Gaming</a>
      <a href="https://www.twitch.tv/directory"><span class="glyph">◉</span>Twitch</a>
      <a href="https://www.reddit.com/r/gaming/"><span class="glyph">◆</span>r/gaming</a>
      <a href="https://hltb.com"><span class="glyph">⏱</span>HowLongToBeat</a>
      <a href="https://www.gamerpower.com/"><span class="glyph">★</span>Free Games</a>
    </nav>

    <section>
      <div class="section-head">
        <div class="section-title"><b>//</b> Game library</div>
        <input class="filter" id="filter" type="text" placeholder="Filter games…" autocomplete="off" />
      </div>
      <div class="grid" id="grid"></div>
    </section>

    <div class="foot"><b>Game Radar</b> · powered by Cule</div>
  </div>

<script>
(function () {
  // Keep in sync with the database in extensions/game-radar/browser.js.
  // The list intentionally lives here too so the welcome page works
  // without depending on the chrome extension being loaded.
  const GAMES = [
    { id: "elden-ring",        name: "Elden Ring",                wiki: "https://eldenring.wiki.fextralife.com/",                                       icon: "⚔",   color: "#c9a45f" },
    { id: "witcher-3",         name: "The Witcher 3",             wiki: "https://witcher.fandom.com/wiki/The_Witcher_3:_Wild_Hunt",                     icon: "🐺",  color: "#7a1f1f" },
    { id: "cyberpunk",         name: "Cyberpunk 2077",            wiki: "https://cyberpunk.fandom.com/wiki/Cyberpunk_2077_(video_game)",                icon: "▣",   color: "#fcee0a" },
    { id: "skyrim",            name: "Skyrim SE",                 wiki: "https://elderscrolls.fandom.com/wiki/The_Elder_Scrolls_V:_Skyrim",             icon: "🐉",  color: "#5b8db5" },
    { id: "stardew",           name: "Stardew Valley",            wiki: "https://stardewvalleywiki.com/",                                                icon: "✿",   color: "#8bc34a" },
    { id: "hollow-knight",     name: "Hollow Knight",             wiki: "https://hollowknight.fandom.com/wiki/Hollow_Knight_Wiki",                       icon: "✦",   color: "#5e35b1" },
    { id: "silksong",          name: "Hollow Knight: Silksong",   wiki: "https://hollowknight.fandom.com/wiki/Hollow_Knight:_Silksong",                  icon: "🕷",  color: "#dc143c" },
    { id: "hades",             name: "Hades",                     wiki: "https://hades.fandom.com/wiki/Hades_Wiki",                                      icon: "⚜",   color: "#e63946" },
    { id: "hades-2",           name: "Hades II",                  wiki: "https://wiki.hades2.online/",                                                   icon: "☾",   color: "#9a4c95" },
    { id: "ds3",               name: "Dark Souls III",            wiki: "https://darksouls3.wiki.fextralife.com/",                                       icon: "✦",   color: "#8b0000" },
    { id: "ds-remastered",     name: "Dark Souls Remastered",     wiki: "https://darksouls.wiki.fextralife.com/",                                        icon: "✦",   color: "#cd853f" },
    { id: "sekiro",            name: "Sekiro",                    wiki: "https://sekiroshadowsdietwice.wiki.fextralife.com/",                            icon: "⚔",   color: "#8b4513" },
    { id: "bg3",               name: "Baldur's Gate 3",           wiki: "https://bg3.wiki/",                                                              icon: "❖",   color: "#722f37" },
    { id: "terraria",          name: "Terraria",                  wiki: "https://terraria.fandom.com/wiki/Terraria_Wiki",                                icon: "⛏",   color: "#76b455" },
    { id: "poe",               name: "Path of Exile",             wiki: "https://www.poewiki.net/wiki/Path_of_Exile_Wiki",                               icon: "◆",   color: "#aa6633" },
    { id: "cs2",               name: "Counter-Strike 2",          wiki: "https://liquipedia.net/counterstrike/Main_Page",                                icon: "◉",   color: "#f7941d" },
    { id: "dota2",             name: "Dota 2",                    wiki: "https://dota2.fandom.com/wiki/Dota_2_Wiki",                                     icon: "⚔",   color: "#c4302b" },
    { id: "tf2",               name: "Team Fortress 2",           wiki: "https://wiki.teamfortress.com/",                                                icon: "♣",   color: "#cf7336" },
    { id: "rust",              name: "Rust",                      wiki: "https://rust.fandom.com/wiki/Rust_Wiki",                                         icon: "🔨",  color: "#cd412b" },
    { id: "valheim",           name: "Valheim",                   wiki: "https://valheim.fandom.com/wiki/Valheim_Wiki",                                  icon: "⚒",   color: "#3a7d44" },
    { id: "factorio",          name: "Factorio",                  wiki: "https://wiki.factorio.com/",                                                    icon: "⚙",   color: "#e88a1a" },
    { id: "rimworld",          name: "RimWorld",                  wiki: "https://rimworldwiki.com/wiki/RimWorld_Wiki",                                   icon: "✧",   color: "#b87333" },
    { id: "sea-of-thieves",    name: "Sea of Thieves",            wiki: "https://seaofthieves.fandom.com/wiki/Sea_of_Thieves_Wiki",                      icon: "☠",   color: "#1c4e80" },
    { id: "rdr2",              name: "Red Dead Redemption 2",     wiki: "https://reddead.fandom.com/wiki/Red_Dead_Redemption_2",                         icon: "★",   color: "#a04030" },
    { id: "gta5",              name: "Grand Theft Auto V",        wiki: "https://gta.fandom.com/wiki/Grand_Theft_Auto_V",                                icon: "▲",   color: "#fed925" },
    { id: "mhw",               name: "Monster Hunter World",      wiki: "https://monsterhunterworld.wiki.fextralife.com/",                               icon: "🐲",  color: "#c9923c" },
    { id: "nms",               name: "No Man's Sky",              wiki: "https://nomanssky.fandom.com/wiki/No_Man%27s_Sky_Wiki",                         icon: "✺",   color: "#ff6f00" },
    { id: "subnautica",        name: "Subnautica",                wiki: "https://subnautica.fandom.com/wiki/Subnautica_Wiki",                            icon: "≈",   color: "#00bcd4" },
    { id: "dst",               name: "Don't Starve Together",     wiki: "https://dontstarve.fandom.com/wiki/Don%27t_Starve_Together",                    icon: "◐",   color: "#5a5a5a" },
    { id: "ror2",              name: "Risk of Rain 2",            wiki: "https://riskofrain2.fandom.com/wiki/Risk_of_Rain_2_Wiki",                       icon: "☂",   color: "#5a4fcf" },
    { id: "helldivers-2",      name: "Helldivers 2",              wiki: "https://helldivers.fandom.com/wiki/Helldivers_2",                                icon: "⛨",   color: "#fdc500" },
    { id: "palworld",          name: "Palworld",                  wiki: "https://palworld.fandom.com/wiki/Palworld_Wiki",                                icon: "✦",   color: "#62b5e5" },
    { id: "minecraft",         name: "Minecraft",                 wiki: "https://minecraft.fandom.com/wiki/Minecraft_Wiki",                              icon: "⛏",   color: "#5d8a3a" },
    { id: "lol",               name: "League of Legends",         wiki: "https://leagueoflegends.fandom.com/wiki/League_of_Legends",                     icon: "♛",   color: "#c8aa6e" },
    { id: "valorant",          name: "Valorant",                  wiki: "https://valorant.fandom.com/wiki/Valorant",                                     icon: "✛",   color: "#ff4655" },
    { id: "wow",               name: "World of Warcraft",         wiki: "https://wowpedia.fandom.com/wiki/Portal:Main",                                  icon: "⚔",   color: "#f8b700" },
    { id: "fortnite",          name: "Fortnite",                  wiki: "https://fortnite.fandom.com/wiki/Fortnite_Wiki",                                icon: "✪",   color: "#9d4dbb" }
  ];

  const grid    = document.getElementById("grid");
  const filter  = document.getElementById("filter");
  const search  = document.querySelector("form.search");
  const queryEl = document.getElementById("q");

  function renderGames(q) {
    const needle = (q || "").trim().toLowerCase();
    const matches = needle
      ? GAMES.filter(g => g.name.toLowerCase().includes(needle))
      : GAMES.slice();
    grid.innerHTML = "";
    if (matches.length === 0) {
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "No games match that filter.";
      grid.appendChild(empty);
      return;
    }
    for (const g of matches) {
      const tile = document.createElement("a");
      tile.className = "tile";
      tile.href = g.wiki;
      tile.style.setProperty("--tile-glow", hexToGlow(g.color));
      tile.innerHTML = `
        <div class="icon" aria-hidden="true">${g.icon}</div>
        <div class="meta">
          <div class="name"></div>
          <div class="kind">Wiki · Guides</div>
        </div>
      `;
      tile.querySelector(".name").textContent = g.name;
      grid.appendChild(tile);
    }
  }

  function hexToGlow(hex) {
    // turn a hex color into a soft translucent radial-gradient stop.
    if (!hex || hex[0] !== "#") return "rgba(0,245,255,0.18)";
    const h = hex.replace("#", "");
    const r = parseInt(h.substring(0, 2), 16);
    const g = parseInt(h.substring(2, 4), 16);
    const b = parseInt(h.substring(4, 6), 16);
    return `rgba(${r}, ${g}, ${b}, 0.28)`;
  }

  function looksLikeUrl(s) {
    if (/^https?:\/\//i.test(s)) return true;
    if (/\s/.test(s)) return false;
    return /^[\w.-]+\.[a-z]{2,}/i.test(s);
  }

  search.addEventListener("submit", (ev) => {
    ev.preventDefault();
    const q = queryEl.value.trim();
    if (!q) return;
    const url = looksLikeUrl(q)
      ? (q.startsWith("http") ? q : "https://" + q)
      : "https://www.google.com/search?q=" + encodeURIComponent(q);
    window.location.href = url;
  });

  queryEl.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { queryEl.value = ""; e.preventDefault(); }
  });

  filter.addEventListener("input", () => renderGames(filter.value));

  renderGames();
})();
</script>
</body>
</html>
